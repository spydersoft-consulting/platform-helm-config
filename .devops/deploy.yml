stages:
# Every build (beta or release) writes to environments/test/images.yaml via
# process-cicd.ps1, which commits with a "BETA - ..." or "RELEASE - ..."
# message prefix depending on which branch (main vs. tag) produced it. This
# checks that commit message directly rather than grepping images.yaml
# content: platform-helm-config hosts multiple independently-versioned
# OCI-chart apps (audit_chart_version, filestore_chart_version, ...) sharing
# one flat imageTags map, so a whole-file content scan can't correctly tell
# "is THIS build a release" once more than one app is in play -- one app's
# already-released, permanently-unlabeled chart_version key would make a
# content scan report isRelease=true forever, even for another app's beta
# build. The triggering commit's own message is inherently scoped to
# exactly the one build that caused this run.
- stage: detect_version
  displayName: Detect Release vs Beta
  jobs:
    - job: detect
      pool:
        name: Default
      steps:
        - script: |
            commitMessage="$(Build.SourceVersionMessage)"
            if [[ "$commitMessage" == RELEASE* ]]; then
              echo "##vso[task.setvariable variable=isRelease;isOutput=true]true"
              echo "Release build detected ($commitMessage) -- stage/production will be offered once test deploys"
            else
              echo "##vso[task.setvariable variable=isRelease;isOutput=true]false"
              echo "Beta/prerelease build detected ($commitMessage) -- stage/production will be skipped entirely"
            fi
          name: DetectVersion

- template: stages/stages-generate-commit-manifests/v1.yml@templates
  parameters:
    environmentName: "test"
    helmfileDirectory: ./
    argoRepoName: ops_nonprod_cluster
    argoBaseDir: apps/platform
    helmfileVersion: "1.1.5"
    pregenerateSteps:
      - task: Docker@2
        displayName: Login to Container Registry (for OCI chart pulls)
        inputs:
          command: login
          containerRegistry: github-spydersoft-docker

# Only queues for a release build (gated on detect_version's output, not on
# which branch produced it). The stage Environment has an approval check
# configured (see ops-automation's public-environment-approvals.tf) --
# deploy_marker_stage pauses there before commit_changes_stage (the step
# that actually triggers Argo to sync) is allowed to run.
- template: stages/stages-generate-commit-manifests/v1.yml@templates
  parameters:
    environmentName: "stage"
    helmfileDirectory: ./
    argoRepoName: ops_nonprod_cluster
    argoBaseDir: apps/platform
    helmfileVersion: "1.1.5"
    dependsOn:
      - generate_commit_manifest_test
      - detect_version
    # dependencies (not stageDependencies -- that context is only valid
    # inside a job's condition, not a stage's own condition) referencing
    # detect_version's job/step output.
    condition: and(succeeded(), eq(dependencies.detect_version.outputs['detect.DetectVersion.isRelease'], 'true'))
    pregenerateSteps:
      - task: Docker@2
        displayName: Login to Container Registry (for OCI chart pulls)
        inputs:
          command: login
          containerRegistry: github-spydersoft-docker
      - script: |
          git config --global user.email "gerega@gmail.com"
          git config --global user.name "CI/CD User"
          cd $(Build.SourcesDirectory)
          # This job's workspace is reused across runs on self-hosted agents
          # (no clean checkout between runs). A prior run's leftover
          # rebase-merge state (from a conflict or a rejected push) blocks
          # every subsequent run's rebase with "there is already a
          # rebase-merge directory" -- confirmed live (builds 6192/6197).
          # git pull --rebase is also the wrong tool here: this step only
          # ever needs the latest origin/main plus one new commit, not to
          # preserve any local history, so fetch+hard-reset is both simpler
          # and self-healing against any stuck local state.
          git rebase --abort 2>/dev/null || true
          git fetch origin
          git checkout main
          git reset --hard origin/main

          cp environments/test/images.yaml environments/stage/images.yaml
          git add environments/stage/images.yaml
          git commit -m "Promote Test To Stage [skip ci]"
          git push origin main
        displayName: Promote Test Images to Stage

# No explicit dependsOn/condition needed: Azure Pipelines' implicit default
# (depends on the immediately preceding stage, condition succeeded()) is
# exactly right here -- if stage was skipped (a beta build), a downstream
# stage depending on it with the default succeeded() condition is skipped
# too, automatically. The production Environment has its own approval
# check, same mechanism as stage above.
- template: stages/stages-generate-commit-manifests/v1.yml@templates
  parameters:
    environmentName: "production"
    helmfileDirectory: ./
    argoRepoName: ops_prod_cluster
    argoBaseDir: apps/platform
    helmfileVersion: "1.1.5"
    pregenerateSteps:
      - task: Docker@2
        displayName: Login to Container Registry (for OCI chart pulls)
        inputs:
          command: login
          containerRegistry: github-spydersoft-docker
      - script: |
          git config --global user.email "gerega@gmail.com"
          git config --global user.name "CI/CD User"
          cd $(Build.SourcesDirectory)
          # See the matching comment in the stage promotion step above --
          # fetch+hard-reset instead of pull --rebase, so this self-heals
          # against any leftover rebase-merge state from a prior run on
          # this self-hosted agent's reused workspace.
          git rebase --abort 2>/dev/null || true
          git fetch origin
          git checkout main
          git reset --hard origin/main

          cp $(Build.SourcesDirectory)/environments/stage/images.yaml $(Build.SourcesDirectory)/environments/production/images.yaml -f
          git add --all
          git commit -m "Promote Stage To Production [skip ci]"
          git push origin main
        displayName: Copy Stage Images to Production
