stages:
# Every automated build (beta or release) writes to environments/test/images.yaml
# via process-cicd.ps1, which commits with a "BETA - ..." or "RELEASE - ..."
# message prefix depending on which branch (main vs. tag) produced it. This
# checks that commit message directly rather than grepping images.yaml
# content: platform-helm-config hosts multiple independently-versioned
# OCI-chart apps (audit_chart_version, filestore_chart_version, ...) sharing
# one flat imageTags map, so a whole-file content scan can't correctly tell
# "is THIS build a release" once more than one app is in play -- one app's
# already-released, permanently-unlabeled chart_version key would make a
# content scan report isRelease=true forever, even for another app's beta
# build. The triggering commit's own message is inherently scoped to
# exactly the one build that caused this run.
#
# A third case exists alongside BETA/RELEASE: a human pushing directly to
# main with a hand-authored commit (e.g. flipping a helmfile.yaml.gotmpl
# release-gate flag like cutOver/renderSecrets, not an image-tag bump).
# Confirmed live: a config-only commit ("Cut identity over to the new
# Postgres in stage") got silently skipped for stage/production because it
# didn't match RELEASE* -- the isRelease gate conflated "should we advance
# the image-promotion train" with "should stage/production's manifests be
# regenerated at all", and only the former should ever cause a skip. BETA
# builds still skip stage/production entirely (unwanted approval-request
# spam for routine main-branch churn); RELEASE and manual builds both
# deploy manifests to stage/production, but only RELEASE also promotes
# images.yaml -- a manual commit's stage/production render reflects
# whatever images.yaml already contains, unchanged.
- stage: detect_version
  displayName: Detect Release vs Beta
  jobs:
    - job: detect
      pool:
        name: Default
      steps:
        - script: |
            commitMessage="$(Build.SourceVersionMessage)"
            if [[ "$commitMessage" == RELEASE* ]]; then
              buildKind=release
              echo "Release build detected ($commitMessage) -- stage/production will be offered once test deploys, images.yaml will be promoted"
            elif [[ "$commitMessage" == BETA* ]]; then
              buildKind=beta
              echo "Beta/prerelease build detected ($commitMessage) -- stage/production will be skipped entirely"
            else
              buildKind=manual
              echo "Manual commit detected ($commitMessage) -- stage/production will be offered once test deploys, images.yaml will NOT be promoted"
            fi
            echo "##vso[task.setvariable variable=buildKind;isOutput=true]$buildKind"
          name: DetectVersion

- template: stages/stages-generate-commit-manifests/v1.yml@templates
  parameters:
    environmentName: "test"
    helmfileDirectory: ./
    argoRepoName: ops_nonprod_cluster
    argoBaseDir: apps/platform
    helmfileVersion: "1.1.5"
    pregenerateSteps:
      - task: Docker@2
        displayName: Login to Container Registry (for OCI chart pulls)
        inputs:
          command: login
          containerRegistry: github-spydersoft-docker

# Queues for release AND manual builds (skips only beta), gated on
# detect_version's output rather than which branch produced it. The stage
# Environment has an approval check configured (see ops-automation's
# public-environment-approvals.tf) -- deploy_marker_stage pauses there
# before commit_changes_stage (the step that actually triggers Argo to
# sync) is allowed to run. The image-promotion step below runs only for
# release builds -- a manual build renders/commits stage's manifests from
# whatever images.yaml already contains, unchanged.
- template: stages/stages-generate-commit-manifests/v1.yml@templates
  parameters:
    environmentName: "stage"
    helmfileDirectory: ./
    argoRepoName: ops_nonprod_cluster
    argoBaseDir: apps/platform
    helmfileVersion: "1.1.5"
    dependsOn:
      - generate_commit_manifest_test
      - detect_version
    # dependencies (not stageDependencies -- that context is only valid
    # inside a job's condition, not a stage's own condition) referencing
    # detect_version's job/step output.
    condition: and(succeeded(), ne(dependencies.detect_version.outputs['detect.DetectVersion.buildKind'], 'beta'))
    pregenerateSteps:
      - task: Docker@2
        displayName: Login to Container Registry (for OCI chart pulls)
        inputs:
          command: login
          containerRegistry: github-spydersoft-docker
      - script: |
          # Only a release build should advance the image-promotion train --
          # a manual (config-only) commit deploys stage as-is. Checked here
          # via the commit message directly (a normal predefined variable
          # available in every job) rather than a cross-stage condition:
          # stageDependencies is not a recognized context for a step-level
          # condition -- confirmed live (build 6242 failed with
          # "Unrecognized value: 'stageDependencies'" at job-init time,
          # before the script even ran).
          commitMessage="$(Build.SourceVersionMessage)"
          if [[ "$commitMessage" != RELEASE* ]]; then
            echo "Not a release build ($commitMessage) -- skipping image promotion"
            exit 0
          fi

          git config --global user.email "gerega@gmail.com"
          git config --global user.name "CI/CD User"
          cd $(Build.SourcesDirectory)
          # This job's workspace is reused across runs on self-hosted agents
          # (no clean checkout between runs). A prior run's leftover
          # rebase-merge state (from a conflict or a rejected push) blocks
          # every subsequent run's rebase with "there is already a
          # rebase-merge directory" -- confirmed live (builds 6192/6197).
          # git pull --rebase is also the wrong tool here: this step only
          # ever needs the latest origin/main plus one new commit, not to
          # preserve any local history, so fetch+hard-reset is both simpler
          # and self-healing against any stuck local state.
          git rebase --abort 2>/dev/null || true
          git fetch origin
          git checkout main
          git reset --hard origin/main

          # Promote only the keys THIS release actually changed in
          # test/images.yaml -- not the whole file. A whole-file cp
          # confirmed live to drag other apps' unrelated in-flight betas
          # into stage's desired manifest: an identity release blindly
          # copied audit_api: 1.0.2-beta.1 (audit's own in-progress test
          # build, nothing to do with identity) into stage, sitting there
          # undetected until the next audit sync would have deployed a
          # beta image to stage. $(Build.SourceVersion) is this whole
          # pipeline run's fixed triggering commit -- diffing it against
          # its own parent gives exactly the key set this build's
          # process-cicd.ps1 run touched, stable regardless of how many
          # commits (including this promotion's own) land afterward.
          CHANGED_KEYS=$(git diff $(Build.SourceVersion)~1 $(Build.SourceVersion) -- environments/test/images.yaml | grep -E '^\+  [a-zA-Z0-9_]+:' | sed -E 's/^\+  ([a-zA-Z0-9_]+):.*/\1/' | sort -u)
          echo "Promoting changed keys: $CHANGED_KEYS"
          for KEY in $CHANGED_KEYS; do
            VALUE=$(grep -E "^  ${KEY}:" environments/test/images.yaml | sed -E "s/^  ${KEY}: *//")
            if grep -qE "^  ${KEY}:" environments/stage/images.yaml; then
              sed -i -E "s|^  ${KEY}:.*|  ${KEY}: ${VALUE}|" environments/stage/images.yaml
            else
              echo "  ${KEY}: ${VALUE}" >> environments/stage/images.yaml
            fi
          done

          git add environments/stage/images.yaml
          git commit -m "Promote Test To Stage [skip ci]"
          git push origin main
        displayName: Promote Test Images to Stage

# No explicit dependsOn/condition needed: Azure Pipelines' implicit default
# (depends on the immediately preceding stage, condition succeeded()) is
# exactly right here -- if stage was skipped (a beta build), a downstream
# stage depending on it with the default succeeded() condition is skipped
# too, automatically. The production Environment has its own approval
# check, same mechanism as stage above.
- template: stages/stages-generate-commit-manifests/v1.yml@templates
  parameters:
    environmentName: "production"
    helmfileDirectory: ./
    argoRepoName: ops_prod_cluster
    argoBaseDir: apps/platform
    helmfileVersion: "1.1.5"
    pregenerateSteps:
      - task: Docker@2
        displayName: Login to Container Registry (for OCI chart pulls)
        inputs:
          command: login
          containerRegistry: github-spydersoft-docker
      - script: |
          # See the matching comment in the stage promotion step above --
          # checked via the commit message directly, not a cross-stage
          # condition (stageDependencies is not valid in a step condition).
          commitMessage="$(Build.SourceVersionMessage)"
          if [[ "$commitMessage" != RELEASE* ]]; then
            echo "Not a release build ($commitMessage) -- skipping image promotion"
            exit 0
          fi

          git config --global user.email "gerega@gmail.com"
          git config --global user.name "CI/CD User"
          cd $(Build.SourcesDirectory)
          # See the matching comment in the stage promotion step above --
          # fetch+hard-reset instead of pull --rebase, so this self-heals
          # against any leftover rebase-merge state from a prior run on
          # this self-hosted agent's reused workspace.
          git rebase --abort 2>/dev/null || true
          git fetch origin
          git checkout main
          git reset --hard origin/main

          # See the matching comment in the stage promotion step above --
          # same fix, same reasoning. $(Build.SourceVersion) is still this
          # whole pipeline run's original triggering commit here (fixed
          # for the run, unaffected by the stage-promotion commit that
          # already landed on main by this point), so the same diff
          # identifies the same key set; values are read from stage's
          # image.yaml (already promoted) rather than test's.
          CHANGED_KEYS=$(git diff $(Build.SourceVersion)~1 $(Build.SourceVersion) -- environments/test/images.yaml | grep -E '^\+  [a-zA-Z0-9_]+:' | sed -E 's/^\+  ([a-zA-Z0-9_]+):.*/\1/' | sort -u)
          echo "Promoting changed keys: $CHANGED_KEYS"
          for KEY in $CHANGED_KEYS; do
            VALUE=$(grep -E "^  ${KEY}:" environments/stage/images.yaml | sed -E "s/^  ${KEY}: *//")
            if grep -qE "^  ${KEY}:" environments/production/images.yaml; then
              sed -i -E "s|^  ${KEY}:.*|  ${KEY}: ${VALUE}|" environments/production/images.yaml
            else
              echo "  ${KEY}: ${VALUE}" >> environments/production/images.yaml
            fi
          done

          git add environments/production/images.yaml
          git commit -m "Promote Stage To Production [skip ci]"
          git push origin main
        displayName: Copy Stage Images to Production
