apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mongodb-secrets-es
spec:
  refreshInterval: 1h0m0s
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: mongodb-secrets
    template:
      type: Opaque
      engineVersion: v2
      data:
        # Root credentials — used for the container bootstrap.
        MONGO_INITDB_ROOT_USERNAME: {{ `"{{ .root_user }}"` }}
        MONGO_INITDB_ROOT_PASSWORD: {{ `"{{ .root_password }}"` }}
        # Application user creds — exposed for the init script which creates the
        # audit-scoped user on first boot.
        MONGO_NON_ROOT_USER: {{ `"{{ .audit_user }}"` }}
        MONGO_NON_ROOT_PASSWORD: {{ `"{{ .audit_password }}"` }}
  data:
  - secretKey: root_user
    remoteRef:
      key: secrets-k8/audit/{{ .Values.vault.environment }}/mongodb
      property: rootUser
  - secretKey: root_password
    remoteRef:
      key: secrets-k8/audit/{{ .Values.vault.environment }}/mongodb
      property: rootPassword
  - secretKey: audit_user
    remoteRef:
      key: secrets-k8/audit/{{ .Values.vault.environment }}/mongodb
      property: user
  - secretKey: audit_password
    remoteRef:
      key: secrets-k8/audit/{{ .Values.vault.environment }}/mongodb
      property: password
