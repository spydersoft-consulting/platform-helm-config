defaultPodOptions:
  imagePullSecrets:
    - name: cr-spydersoft-github

controllers:
  main:
    enabled: true
    type: deployment
    replicas: 1
    revisionHistoryLimit: 1
    strategy: Recreate
    containers:
      main:
        image:
          repository: rabbitmq
          pullPolicy: IfNotPresent
          tag: 3-management
        envFrom:
          - secretRef:
              name: rabbitmq-secrets
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              exec:
                command: ["rabbitmq-diagnostics", "-q", "ping"]
              initialDelaySeconds: 30
              periodSeconds: 30
              timeoutSeconds: 10
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              exec:
                command: ["rabbitmq-diagnostics", "-q", "check_port_connectivity"]
              initialDelaySeconds: 15
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
          startup:
            enabled: true
            custom: true
            spec:
              exec:
                command: ["rabbitmq-diagnostics", "-q", "check_running"]
              periodSeconds: 10
              timeoutSeconds: 10
              failureThreshold: 30

service:
  main:
    enabled: true
    controller: main
    primary: true
    type: ClusterIP
    ports:
      amqp:
        enabled: true
        primary: true
        port: 5672
        targetPort: 5672
      management:
        enabled: true
        port: 15672
        targetPort: 15672

persistence:
  rabbitmq-data:
    enabled: true
    type: persistentVolumeClaim
    storageClass: nfs-client
    accessMode: ReadWriteMany
    size: 10Gi
    advancedMounts:
      main:
        main:
          - path: /var/lib/rabbitmq
  rabbitmq-secrets:
    enabled: true
    type: secret
    name: rabbitmq-secrets

route:
  main:
    enabled: false
    kind: HTTPRoute
    parentRefs:
      - name: main
        namespace: envoy-gateway-system
        group: gateway.networking.k8s.io
        kind: Gateway
    hostnames:
      - rabbitmq.mattgerega.net
    rules:
      - backendRefs:
          - identifier: main
            port: 15672

oidc:
  enabled: false
  issuer: https://auth.mattgerega.com
  clientId: platform-tools
  vaultKey: platform-tools
  scopes:
    - openid
    - profile
    - roles

vault:
  environment: ""
