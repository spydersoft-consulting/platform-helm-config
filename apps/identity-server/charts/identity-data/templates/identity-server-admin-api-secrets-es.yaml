{{- if .Values.renderSecrets }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: identity-server-admin-api-secrets-es
spec:
  refreshInterval: 1h0m0s
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: identity-server-admin-api-secrets
    template:
      type: kubernetes.io/secret
      engineVersion: v2
      data:
        # Same identity Postgres DB as identity-server (identity-data-postgres,
        # see the matching comment in identity-server-secrets-es.yaml).
        # Reuses the identity DB creds.
        ConnectionStrings__IdentityConnection: {{ `"Host=identity-data-postgres;Database=identity;Username={{ .db_user }};Password={{ .db_password }}"` }}
        AutoMapper__License: {{ `"{{ .automapper_license }}"` }}
  data:
  - secretKey: db_user
    remoteRef:
      key: secrets-k8/identity/{{ .Values.vault.environment }}/postgres
      property: user
  - secretKey: db_password
    remoteRef:
      key: secrets-k8/identity/{{ .Values.vault.environment }}/postgres
      property: password
  - secretKey: automapper_license
    remoteRef:
      key: secrets-k8/automapper
      property: licenseKey
{{- end }}
