{{- if .Values.renderSecrets }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: identity-server-admin-ui-secrets-es
spec:
  refreshInterval: 1h0m0s
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: identity-server-admin-ui-secrets
    template:
      type: kubernetes.io/secret
      engineVersion: v2
      data:
        # Cleartext OIDC client secret for the 'identity.admin.frontend' client.
        # Must match the SHA-256 hash seeded into the identity DB for that client.
        OidcProxySettings__Oidc__ClientSecret: {{ `"{{ .admin_frontend_clientsecret }}"` }}
  data:
  - secretKey: admin_frontend_clientsecret
    remoteRef:
      key: secrets-k8/identity/{{ .Values.vault.environment }}/admin-frontend
      property: clientsecret
{{- end }}
