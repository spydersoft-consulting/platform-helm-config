apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: audit-secrets-es
spec:
  refreshInterval: 1h0m0s
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: audit-secrets
    template:
      type: Opaque
      engineVersion: v2
      data:
        # Messaging — consumed by Spydersoft.Messaging.RabbitMQ via RabbitMqOptions
        RabbitMq__Username: {{ `"{{ .rabbitmq_user }}"` }}
        RabbitMq__Password: {{ `"{{ .rabbitmq_password }}"` }}
        # MongoDB connection string for the audit-scoped user (created by the
        # mongodb chart's init script). Host resolves to the in-namespace service.
        ConnectionStrings__audit-mongo: {{ `"mongodb://{{ .mongo_user }}:{{ .mongo_password }}@mongodb:27017/audit"` }}
  data:
  - secretKey: rabbitmq_user
    remoteRef:
      key: secrets-k8/audit/{{ .Values.vault.environment }}/rabbitmq
      property: user
  - secretKey: rabbitmq_password
    remoteRef:
      key: secrets-k8/audit/{{ .Values.vault.environment }}/rabbitmq
      property: password
  - secretKey: mongo_user
    remoteRef:
      key: secrets-k8/audit/{{ .Values.vault.environment }}/mongodb
      property: user
  - secretKey: mongo_password
    remoteRef:
      key: secrets-k8/audit/{{ .Values.vault.environment }}/mongodb
      property: password
