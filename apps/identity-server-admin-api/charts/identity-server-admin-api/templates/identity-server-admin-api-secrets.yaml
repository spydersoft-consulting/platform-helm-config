apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: identity-server-admin-api-secrets-es
spec:
  refreshInterval: 1h0m0s
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: identity-server-admin-api-secrets
    template:
      type: kubernetes.io/secret
      engineVersion: v2
      data:
        # Same identity Postgres DB as identity-server. Host resolves to the
        # postgres service created by the identity-server release in this
        # namespace (identity-server-postgres). Reuses the identity DB creds.
        ConnectionStrings__IdentityConnection: {{ `"Host=identity-server-postgres;Database=identity;Username={{ .db_user }};Password={{ .db_password }}"` }}
        AutoMapper__License: {{ `"{{ .automapper_license }}"` }}
  data:
  - secretKey: db_user
    remoteRef:
      key: secrets-k8/identity/{{ .Values.vault.environment }}/postgres
      property: user
  - secretKey: db_password
    remoteRef:
      key: secrets-k8/identity/{{ .Values.vault.environment }}/postgres
      property: password
  - secretKey: automapper_license
    remoteRef:
      key: secrets-k8/automapper
      property: licenseKey
