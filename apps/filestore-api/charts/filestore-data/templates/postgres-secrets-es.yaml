apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  # App-qualified, not the generic "postgres-secrets-es" pitstop-data/
  # techradar-data use -- those live in their own dedicated namespace, but
  # filestore-data shares platform-{env} with other apps (identity-server
  # already owns an object with that exact generic name). Confirmed live:
  # the generic name collided with identity-server's own postgres secret,
  # and filestore-data's sync overwrote it with filestore's credentials.
  name: filestore-postgres-secrets-es
spec:
  refreshInterval: 1h0m0s
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: filestore-postgres-secrets
  data:
  - secretKey: POSTGRES_USER
    remoteRef:
      key: secrets-k8/filestore-api/{{ .Values.vault.environment }}/postgres
      property: rootUser
  - secretKey: POSTGRES_PASSWORD
    remoteRef:
      key: secrets-k8/filestore-api/{{ .Values.vault.environment }}/postgres
      property: rootPassword
  - secretKey: POSTGRES_NON_ROOT_USER
    remoteRef:
      key: secrets-k8/filestore-api/{{ .Values.vault.environment }}/postgres
      property: user
  - secretKey: POSTGRES_NON_ROOT_PASSWORD
    remoteRef:
      key: secrets-k8/filestore-api/{{ .Values.vault.environment }}/postgres
      property: password
