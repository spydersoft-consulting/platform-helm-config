apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: filestore-secrets-es
spec:
  refreshInterval: 1h0m0s
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: filestore-secrets
    template:
      type: Opaque
      engineVersion: v2
      data:
        # PostgreSQL connection string (Npgsql format). Host is the
        # dedicated Postgres owned by the filestore-data release (see
        # controllers.postgres, forceRename to "<release>-postgres" below).
        # Hardcoded rather than templated with .Release.Name because this
        # whole string is a backtick-raw Go template literal (evaluated by
        # the ExternalSecret controller, not Helm) -- a Release.Name
        # expression here would leak through unevaluated. Matches the same
        # precedent in techradar-data-api-es.yaml / pitstop's data-api-es.yaml.
        ConnectionStrings__filestore: {{ `"Host=filestore-data-postgres;Database=filestore;Username={{ .pg_user }};Password={{ .pg_password }}"` }}
        # S3-compatible storage credentials
        Storage__AccessKey: {{ `"{{ .s3_access_key }}"` }}
        Storage__SecretKey: {{ `"{{ .s3_secret_key }}"` }}
  data:
  - secretKey: pg_user
    remoteRef:
      key: secrets-k8/filestore-api/{{ .Values.vault.environment }}/postgres
      property: user
  - secretKey: pg_password
    remoteRef:
      key: secrets-k8/filestore-api/{{ .Values.vault.environment }}/postgres
      property: password
  - secretKey: s3_access_key
    remoteRef:
      key: secrets-k8/filestore-api/{{ .Values.vault.environment }}/s3
      property: access_key
  - secretKey: s3_secret_key
    remoteRef:
      key: secrets-k8/filestore-api/{{ .Values.vault.environment }}/s3
      property: secret_key
