apiVersion: v2
# MUST stay distinct from the OCI chart's Chart.yaml `name:` (filestore-api,
# published from the file-storage app repo). helmfile's output-dir-template
# groups rendered manifests by chart name, not release name -- two charts
# with the same internal name in the same namespace silently overwrite each
# other's output in the same git commit. See D:\spydersoft\plans\gitopsv2\helm-release-rename-runbook.md Pitfall A.
name: filestore-data
description: FileStore — Postgres + Vault-backed app secrets for filestore-api (the app itself is published separately as the filestore-api OCI chart)

type: application

version: 0.1.0

appVersion: "0.0.0"

dependencies:
- name: common
  version: 4.4.0
  repository: https://bjw-s-labs.github.io/helm-charts
